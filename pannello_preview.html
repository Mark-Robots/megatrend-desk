<!-- ============================================================
     PANNELLO "MOVIMENTI PREVISTI" — da incollare in index.html
     (es. subito sopra o sotto la sezione delle posizioni aperte)
     Legge data/preview_signals.json generato dal workflow Preview.
     Autonomo: stili inline, nessuna dipendenza esterna.
     ============================================================ -->
<div id="preview-panel" style="display:none; margin:18px 0; padding:16px 18px;
     background:#12151c; border:1px solid #232838; border-radius:12px;
     font-family:'JetBrains Mono', monospace;">
  <div style="display:flex; justify-content:space-between; align-items:baseline; flex-wrap:wrap; gap:6px;">
    <div style="font-size:14px; font-weight:700; color:#e8eaf0;">
      &#9889; Movimenti previsti <span style="color:#6b7280; font-weight:400;">(se la settimana chiudesse ora)</span>
    </div>
    <div id="pv-updated" style="font-size:11px; color:#6b7280;"></div>
  </div>
  <div id="pv-body" style="margin-top:10px;"></div>
  <div style="margin-top:10px; font-size:10.5px; color:#4b5563;">
    Anteprima indicativa &middot; il segnale ufficiale si forma alla chiusura di venerd&igrave;.
  </div>
</div>
<script>
(function(){
  const MODES = [['balanced','BALANCED'],['aggressive','AGGRESSIVE']];
  fetch('data/preview_signals.json?t=' + Date.now())
    .then(r => { if(!r.ok) throw new Error(r.status); return r.json(); })
    .then(d => {
      const panel = document.getElementById('preview-panel');
      const body = document.getElementById('pv-body');
      const upd = new Date(d.updated_at);
      document.getElementById('pv-updated').textContent =
        'agg. ' + upd.toLocaleString('it-IT',{timeZone:'Europe/Rome',day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) + ' ITA · barra ' + d.last_bar;
      let html = '';
      MODES.forEach(([key,label]) => {
        const m = d.modes[key]; if(!m) return;
        const rows = [];
        m.sectors.forEach(s => {
          if (s.move === 'ingresso')
            rows.push('<span style="color:#34d399;">&#9650; INGRESSO</span> ' + esc(s.name) +
                      ' <span style="color:#9ca3af;">&rarr; ' + esc(s.ticker||'?') + scoreTxt(s) + '</span>');
          else if (s.move === 'uscita')
            rows.push('<span style="color:#f87171;">&#9660; USCITA</span> ' + esc(s.name) + scoreSuffix(s));
          else if (s.borderline)
            rows.push('<span style="color:#fbbf24;">&#9888; borderline</span> ' + esc(s.name) +
                      ' <span style="color:#9ca3af;">(' + esc(s.ticker||'?') + ' ROC4 ' + fmt(s.roc4) + '%)</span>');
        });
        html += '<div style="margin-top:8px;">'
              + '<span style="font-size:11px; letter-spacing:1px; color:#818cf8;">' + label + '</span> ';
        if (rows.length === 0)
          html += '<span style="font-size:12.5px; color:#6b7280;">nessun movimento previsto</span>';
        else
          html += '<div style="font-size:12.5px; color:#d1d5db; line-height:1.8;">' + rows.join('<br>') + '</div>';
        html += '</div>';
      });
      body.innerHTML = html;
      panel.style.display = 'block';
    })
    .catch(() => { /* nessun preview disponibile: pannello resta nascosto */ });

  function esc(t){ const e=document.createElement('span'); e.textContent=t==null?'':String(t); return e.innerHTML; }
  function fmt(x){ return (x==null)?'n/d':(x>=0?'+':'')+x.toFixed(1); }
  function scoreTxt(s){ return (s.roc13!=null)?(' · ROC13 '+fmt(s.roc13)+'%'):''; }
  function scoreSuffix(s){ return (s.ticker)?(' <span style="color:#9ca3af;">('+esc(s.ticker)+')</span>'):''; }
})();
</script>
