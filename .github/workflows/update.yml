name: Update Megatrend Data
on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'data/**'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy
      - name: Show working directory before scripts
        run: |
          echo "=== Working directory ==="
          pwd
          echo "=== Repo structure ==="
          ls -la
          echo "=== data/ contents ==="
          ls -la data/ 2>&1 || echo "data/ does not exist"
          echo "=== scripts/ contents ==="
          ls -la scripts/
      - name: Run ETF sector update script
        run: |
          echo "=== Running update_data.py ==="
          python scripts/update_data.py
          echo "=== After update_data.py: data/ contents ==="
          ls -la data/ 2>&1 || echo "data/ does not exist"
      - name: Run stocks update script
        run: |
          echo "=== Running update_stocks.py ==="
          python scripts/update_stocks.py
          echo "=== EXIT CODE: $? ==="
          echo "=== After update_stocks.py: data/ contents ==="
          ls -la data/ 2>&1 || echo "data/ does not exist"
      - name: Final check generated files
        run: |
          echo "=== Final data/ contents ==="
          ls -la data/ 2>&1
          echo "=== Sizes ==="
          for f in data/sector_data.json data/stocks_data.json data/ranking_history.json data/stocks_state.json; do
            if [ -f "$f" ]; then
              echo "EXISTS: $f ($(wc -c < "$f") bytes)"
            else
              echo "MISSING: $f"
            fi
          done
          echo "=== Git status ==="
          git status
      - name: Commit and push changes
        run: |
          echo "=== Commit and push ==="
          git config --global user.name 'Megatrend Bot'
          git config --global user.email 'bot@users.noreply.github.com'
          echo "Files before add:"
          git status --short
          git add data/*.json 2>/dev/null || true
          echo "Files staged after add:"
          git status --short
          if git diff --staged --quiet; then
            echo "ATTENZIONE: Nessuna modifica staged dopo git add!"
            echo "Verifico se i file esistono fisicamente:"
            ls -la data/ 2>&1
            exit 0
          fi
          git commit -m "Auto-update: $(date -u +'%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3 4 5; do
            if git push; then
              echo "✓ Push riuscito al tentativo $i"
              exit 0
            fi
            echo "✗ Push tentativo $i fallito"
            git fetch origin main
            git reset --hard origin/main
            git add data/*.json 2>/dev/null || true
            if ! git diff --staged --quiet; then
              git commit -m "Auto-update retry $i"
            fi
            sleep $((i * 2))
          done
          echo "ERROR: push fallito"
          exit 1
