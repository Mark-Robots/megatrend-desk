name: Preview Signals
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy
      - name: Run preview script
        run: |
          python scripts/preview_signals.py
      - name: Commit and push preview
        run: |
          git config --global user.name 'Megatrend Bot'
          git config --global user.email 'bot@users.noreply.github.com'
          git add data/preview_signals.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Nessuna modifica al preview"
            exit 0
          fi
          git commit -m "Preview: $(date -u +'%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Push OK al tentativo $i"
              exit 0
            fi
            git fetch origin main
            git reset --hard origin/main
            git add data/preview_signals.json 2>/dev/null || true
            if ! git diff --staged --quiet; then
              git commit -m "Preview retry $i"
            fi
            sleep $((i * 2))
          done
          echo "ERROR: push fallito"
          exit 1
